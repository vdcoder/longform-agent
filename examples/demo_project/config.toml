[llm]
base_url       = "http://localhost:8080/v1"
model          = "local"
api_key        = "not-needed"
max_tokens     = 4096
temperature    = 0.7
chat_slot      = 0
summarize_slot = 1

[search]
max_results       = 5
max_snippet_chars = 300

[agent]
project_dir          = "project"
keep_last_n          = 6
max_full_chapters    = 0
max_tool_iterations  = 6
memory_max_chars     = 4000
summary_max_chars    = 3000
